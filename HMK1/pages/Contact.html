<h2>Get in Touch🤙🏾</h2>

<form>
   <label for="firstname">First name: </label>
        <input 
            type="text" 
            id="firstname" 
            name="firstname" 
            autocomplete="given-name"
            pattern="[A-Za-z]+"
            title="Letters only - no numbers allowed"
            list="firstnamelist"
            required
        >
        <datalist id="firstnamelist">
            <option value="">
        </datalist>
        <br><br>

        <label for="lastname">Last name: </label>
        <input 
            type="text" 
            id="lastname" 
            name="lastname" 
            autocomplete="family-name"
            pattern="[A-Za-z]+"
            title="Letters only - no numbers allowed"
            list="lastnamelist"
            required
        >
        <datalist id="lastnamelist">
            <option value="">
        </datalist>
        <br><br>

        <label for="email">Email: </label>
        <input 
            type="email" 
            id="email" 
            name="email" 
            autocomplete="email"
            title="Please enter a valid email address"
            required
        >
        <br><br>

        <label for="telephone">Telephone: </label>
        <input 
            type="tel" 
            id="telephone" 
            name="telephone" 
            autocomplete="tel"
            pattern="[0-9+\-\s]+"
            title="Please enter a valid phone number"
            required
        >
        <br><br>

        <label for="message"></label><br>
        <textarea 
            id="message" 
            name="message" 
            rows="10" 
            cols="40" 
            placeholder="Please type your message here"
            required
        ></textarea>
        <br><br>

        <button type="submit">Send Message</button>

    </form>
